<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EL EQUIPO DEL MICU Y RODRI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <h1>EL EQUIPO DEL MICU Y RODRI ⚽</h1>
    <p>Armá tu 11 titular, mové jugadores y guardá tus equipos.</p>
  </header>

  <div class="panel">
    <input id="teamName" placeholder="Nombre del equipo">

    <select id="formationSelect">
      <option>4-4-2</option>
      <option>4-3-3</option>
      <option>4-2-3-1</option>
      <option>4-1-4-1</option>
      <option>3-5-2</option>
      <option>3-4-3</option>
      <option>5-3-2</option>
      <option>5-4-1</option>
    </select>

    <button id="saveBtn">Guardar</button>
    <button id="clearBtn">Limpiar</button>
  </div>

  <main class="layout">
    <section class="field-card">
      <div class="field" id="field"></div>
      <p class="hint">Tocá un jugador para editarlo. Mantené y arrastrá para moverlo.</p>
    </section>

    <aside class="saved">
      <h2>Equipos guardados</h2>
      <div id="savedTeams"></div>
    </aside>
  </main>
</div>

<script src="main.js"></script>
</body>
</html>
