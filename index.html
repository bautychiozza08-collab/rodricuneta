<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EL EQUIPO DEL MICU Y RODRI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<header>
  <h1>EL EQUIPO DEL MICU Y RODRI ⚽</h1>
  <p>Armá tu 11 titular como un DT profesional</p>
</header>

<div class="panel">
  <input id="teamName" placeholder="Nombre del equipo">

  <select id="formationSelect">
    <option>4-4-2</option>
    <option>4-3-3</option>
    <option>4-2-3-1</option>
    <option>3-5-2</option>
    <option>3-4-3</option>
    <option>5-3-2</option>
    <option>5-4-1</option>
  </select>

  <button id="saveBtn">Guardar</button>
  <button id="clearBtn">Limpiar</button>
</div>

<div class="layout">

  <div class="field" id="field"></div>

  <div class="saved">
    <h2>Equipos guardados</h2>
    <div id="savedTeams"></div>
  </div>

</div>

</div>

<script src="main.js"></script>
</body>
</html>
